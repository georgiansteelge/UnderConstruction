<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Georgian Steel - Coming soon">
    <meta name="theme-color" content="#6b7280">
    <title>Georgian Steel - Under Construction</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%231f2937'/><path d='M8 12h16v2H8zm0 4h16v2H8zm0 4h16v2H8z' fill='%23f97316'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ea580c;
            --primary-hover: #c2410c;
            --primary-glow: rgba(234, 88, 12, 0.35);
            --bg-start: #94a3b8;
            --bg-end: #64748b;
            --card-bg: #ffffff;
            --card-border: rgba(255, 255, 255, 0.6);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.04);
            --shadow-card-hover: 0 32px 64px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 0, 0, 0.06);
            --ease: cubic-bezier(0.33, 1, 0.68, 1);
            --duration: 0.3s;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 50%, #475569 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Language Selector */
        .language-selector {
            position: fixed;
            top: 24px;
            right: 24px;
            display: flex;
            gap: 4px;
            background: var(--card-bg);
            padding: 6px;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-card);
            z-index: 1000;
            border: 1px solid var(--card-border);
        }

        .lang-btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: background var(--duration) var(--ease), color var(--duration) var(--ease), transform 0.2s var(--ease);
            letter-spacing: 0.02em;
        }

        .lang-btn:hover {
            background: #f1f5f9;
            color: var(--text-primary);
        }

        .lang-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Main Container */
        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 8px 18px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
            animation: slideDown 0.5s var(--ease) both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 52px 40px;
            animation: fadeInScale 0.6s var(--ease) 0.1s both;
            border: 1px solid var(--card-border);
            transition: box-shadow var(--duration) var(--ease), transform var(--duration) var(--ease);
        }

        .card:hover {
            box-shadow: var(--shadow-card-hover);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .icon {
            width: 360px;
           
            margin: 0 auto 32px;
            display: block;
        }

        .logo-img {
            object-fit: contain;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--text-primary);
            line-height: 1.25;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
            max-width: 36ch;
            margin-left: auto;
            margin-right: auto;
        }

        .contact {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .contact a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--duration) var(--ease);
            border-bottom: 1px solid transparent;
        }

        .contact a:hover {
            color: var(--primary-hover);
            border-bottom-color: var(--primary-hover);
        }

        .notify-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background var(--duration) var(--ease), box-shadow var(--duration) var(--ease), transform 0.2s var(--ease);
            box-shadow: 0 4px 14px var(--primary-glow);
            letter-spacing: 0.02em;
        }

        .notify-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 8px 24px var(--primary-glow);
            transform: translateY(-2px);
        }

        .notify-btn:active {
            transform: translateY(0);
        }

        .notify-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }

        /* Footer */
        .footer {
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body { padding: 16px; }
            .card { padding: 40px 28px; }
            h1 { font-size: 1.5rem; }
            .subtitle { font-size: 0.9375rem; margin-bottom: 20px; }
            .language-selector { top: 16px; right: 16px; padding: 5px; }
            .lang-btn { padding: 8px 14px; font-size: 12px; }
            .icon { width: 120px; height: 120px; margin-bottom: 28px; }
            .badge { padding: 6px 14px; font-size: 10px; margin-bottom: 20px; }
            .notify-btn { padding: 12px 28px; font-size: 0.875rem; }
        }

        @media (max-width: 480px) {
            .card { padding: 32px 22px; }
            h1 { font-size: 1.375rem; }
            .subtitle { font-size: 0.875rem; }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(160deg, #334155 0%, #1e293b 50%, #0f172a 100%);
            }
            :root {
                --card-bg: #1e293b;
                --card-border: rgba(255, 255, 255, 0.08);
                --text-primary: #f1f5f9;
                --text-secondary: #cbd5e1;
                --text-muted: #94a3b8;
            }
            .card { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
            .card:hover { box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.6); }
            .language-selector { background: #1e293b; border-color: rgba(255,255,255,0.08); }
            .lang-btn:hover { background: #334155; color: #f1f5f9; }
            .contact a { color: #fb923c; }
            .contact a:hover { color: #fdba74; border-bottom-color: #fdba74; }
            .footer { border-top-color: #334155; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        @media (prefers-contrast: more) {
            .lang-btn { border: 1px solid var(--text-muted); }
            .lang-btn.active { border-color: var(--primary-hover); }
        }
    </style>
</head>
<body>
    <!-- Language Selector -->
    <div class="language-selector" role="group" aria-label="Language selection">
        <button class="lang-btn active" data-lang="en" aria-label="English">EN</button>
        <button class="lang-btn" data-lang="ka" aria-label="ქართული (Georgian)">KA</button>
        <button class="lang-btn" data-lang="ru" aria-label="Русский (Russian)">RU</button>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="badge" data-i18n="badge"></div>

        <div class="card">
            <img class="icon logo-img" src="image/logogs.png" alt="Georgian Steel" />

            <h1 data-i18n="title"></h1>
            <p class="subtitle" data-i18n="subtitle"></p>
            <p class="contact" data-i18n="contact"></p>

            <a href="mailto:info@georgiansteel.ge?subject=Website%20launch%20notification" class="notify-btn" data-i18n="button"></a>

            <div class="footer" data-i18n="footer"></div>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                badge: 'This website is currently under construction. Please check back soon.',
                title: 'Under Construction',
                subtitle: 'This website is currently under construction. Please check back soon.',
                contact: 'Contact: <a href="mailto:info@georgiansteel.ge">info@georgiansteel.ge</a>',
                button: 'Notify me',
                footer: '© ' + new Date().getFullYear() + ' Georgian Steel Enginering'
            },
            ka: {
                badge: 'ვებსაიტი ამჟამად მზადების პროცესშია. გთხოვთ, მოგვიანებით ისევ გვეწვიეთ.',
                title: 'საიტი მზადების პროცესშია',
                subtitle: 'ვებსაიტი ამჟამად მზადების პროცესშია. გთხოვთ, მოგვიანებით ისევ გვეწვიეთ.',
                contact: 'კონტაქტი: <a href="mailto:info@georgiansteel.ge">info@georgiansteel.ge</a>',
                button: 'შემატყობინე',
                footer: '© ' + new Date().getFullYear() + ' Georgian Steel Enginering'
            },
            ru: {
                badge: 'Сайт сейчас в разработке. Пожалуйста, загляните позже.',
                title: 'Сайт в разработке',
                subtitle: 'Сайт сейчас в разработке. Пожалуйста, загляните позже.',
                contact: 'Контакт: <a href="mailto:info@georgiansteel.ge">info@georgiansteel.ge</a>',
                button: 'Сообщить мне',
                footer: '© ' + new Date().getFullYear() + ' Georgian Steel Enginering'
            }
        };

        // Get current language from localStorage or default to 'en'
        function getCurrentLanguage() {
            return localStorage.getItem('selectedLanguage') || 'en';
        }

        // Set HTML lang attribute and meta tags
        function setHtmlLang(lang) {
            document.documentElement.lang = lang;
            updateMetaTags(lang);
        }

        // Update meta tags for SEO
        function updateMetaTags(lang) {
            const descriptions = {
                en: 'Georgian Steel - Coming soon. Under construction.',
                ka: 'Georgian Steel - მალე გამოვა. მომზადების პროცესში.',
                ru: 'Georgian Steel - Скоро появится. Находится в разработке.'
            };

            const titles = {
                en: 'Georgian Steel - Under Construction',
                ka: 'Georgian Steel - მომზადების პროცესში',
                ru: 'Georgian Steel - Сайт в разработке'
            };

            document.title = titles[lang] || titles['en'];
            document.querySelector('meta[name="description"]').setAttribute('content', descriptions[lang] || descriptions['en']);
        }

        // Update all translatable elements
        function updateLanguage(lang) {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(element => {
                const key = element.getAttribute('data-i18n');
                const text = translations[lang][key];
                if (text) {
                    element.innerHTML = text;
                }
            });

            // Update document language and meta tags
            setHtmlLang(lang);
        }

        // Initialize language on page load
        function initializeLanguage() {
            const savedLang = getCurrentLanguage();
            updateLanguage(savedLang);
            updateActiveButton(savedLang);
        }

        // Update active button state
        function updateActiveButton(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
        }

        // Event listeners for language buttons
        document.querySelectorAll('.lang-btn').forEach(button => {
            button.addEventListener('click', function() {
                const lang = this.getAttribute('data-lang');
                localStorage.setItem('selectedLanguage', lang);
                updateLanguage(lang);
                updateActiveButton(lang);
            });

            // Keyboard support (Enter and Space)
            button.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeLanguage);

        // Fallback if DOMContentLoaded already fired
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeLanguage);
        } else {
            initializeLanguage();
        }
    </script>
</body>
</html>
